<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>App icon 1200</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 1200px; overflow: hidden; }
  body {
    background: #f7f4ee;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg { width: 1060px; height: 1060px; }
</style>
</head>
<body>
  <!-- Brand mark recomposed for the square icon: laptop behind, phone in
       front, ONE marigold cart spanning the seam. Single subject, no text. -->
  <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- laptop screen -->
    <rect x="36" y="20" width="54" height="42" rx="5.5" stroke="#1C1815" stroke-width="6"/>
    <!-- laptop base -->
    <rect x="30" y="70.5" width="66" height="7.5" rx="3.75" fill="#1C1815"/>
    <!-- phone (paper fill occludes the laptop + base behind) -->
    <rect x="7" y="26" width="31" height="53" rx="7.5" fill="#F7F4EE" stroke="#1C1815" stroke-width="6"/>
    <line x1="18.5" y1="71.5" x2="26.5" y2="71.5" stroke="#1C1815" stroke-width="4.5" stroke-linecap="round"/>
    <!-- one cart spanning the seam: paper halo underneath, then marigold -->
    <g stroke-linecap="round" stroke-linejoin="round">
      <path d="M34.5 42.5 h30 l-3.3 14.2 a4 4 0 0 1 -3.9 3.1 h-15.6 a4 4 0 0 1 -3.9 -3.1 L32 35.5 h-5.6"
        stroke="#F7F4EE" stroke-width="11"/>
      <circle cx="41" cy="64.8" r="5.2" fill="#F7F4EE"/>
      <circle cx="56.6" cy="64.8" r="5.2" fill="#F7F4EE"/>
      <path d="M34.5 42.5 h30 l-3.3 14.2 a4 4 0 0 1 -3.9 3.1 h-15.6 a4 4 0 0 1 -3.9 -3.1 L32 35.5 h-5.6"
        stroke="#D8541E" stroke-width="6"/>
      <circle cx="41" cy="64.8" r="4" fill="#D8541E"/>
      <circle cx="56.6" cy="64.8" r="4" fill="#D8541E"/>
    </g>
  </svg>
</body>
</html>
